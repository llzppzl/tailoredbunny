<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Simple Bunny Avatar -->
  <circle cx="50" cy="55" r="35" fill="#f5f5f5" stroke="#333" stroke-width="2"/>
  <!-- Left Ear -->
  <ellipse cx="30" cy="20" rx="8" ry="20" fill="#f5f5f5" stroke="#333" stroke-width="2"/>
  <ellipse cx="30" cy="20" rx="4" ry="15" fill="#ffb6c1"/>
  <!-- Right Ear -->
  <ellipse cx="70" cy="20" rx="8" ry="20" fill="#f5f5f5" stroke="#333" stroke-width="2"/>
  <ellipse cx="70" cy="20" rx="4" ry="15" fill="#ffb6c1"/>
  <!-- Face -->
  <circle cx="38" cy="50" r="4" fill="#333"/>
  <circle cx="62" cy="50" r="4" fill="#333"/>
  <ellipse cx="50" cy="62" rx="5" ry="3" fill="#ffb6c1"/>
  <!-- Smile -->
  <path d="M 42 68 Q 50 75 58 68" stroke="#333" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Whiskers -->
  <line x1="20" y1="58" x2="35" y2="60" stroke="#333" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="20" y1="65" x2="35" y2="65" stroke="#333" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="80" y1="58" x2="65" y2="60" stroke="#333" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="80" y1="65" x2="65" y2="65" stroke="#333" stroke-width="1.5" stroke-linecap="round"/>
</svg>
